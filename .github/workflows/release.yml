name: Build and release exe

# Builds the standalone Windows exe on every push to master and publishes a
# GitHub release tagged from the VERSION file. Bumping VERSION + merging cuts a
# new release; re-merges at the same version are a no-op (the tag already
# exists). Can also be run manually from the Actions tab.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write   # needed to create the tag + release via GITHUB_TOKEN

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Run test suite (gate)
        run: python claude_usage_tray.py --test

      - name: Build exe
        run: |
          python generate_icon.py
          pyinstaller --onefile --noconsole --icon=icon.ico --name ClaudeUsageTray --collect-all pystray --collect-all watchdog claude_usage_tray.py

      - name: Smoke-test the statusline hook from the exe (gate)
        shell: cmd
        # A --noconsole (GUI-subsystem) exe only exposes stdin/stdout when the
        # parent redirects them via handles -- which cmd file-redirection and
        # Claude Code's own spawn both do, but a PowerShell pipe does NOT. So
        # this gate MUST use cmd redirection, or it would spuriously "fail".
        run: |
          echo {"model":{"display_name":"test"},"rate_limits":{"five_hour":{"used_percentage":50,"resets_at":1782500000}}}> payload.json
          dist\ClaudeUsageTray.exe --statusline-hook < payload.json > hookout.txt
          type hookout.txt
          findstr /C:"test | 5h 50%" hookout.txt || (echo HOOK SMOKE TEST FAILED & exit /b 1)

      - name: Read version
        id: ver
        shell: bash
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Create release if the tag is new
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — nothing to publish."
            exit 0
          fi
          gh release create "$tag" dist/ClaudeUsageTray.exe \
            --title "$tag" \
            --notes "Standalone Windows executable for the Claude Code usage tray. No Python required — download \`ClaudeUsageTray.exe\`, run it, and it wires up the statusLine hook automatically (restart Claude Code once)."
