name: Build and release exe

# Builds the standalone Windows exe on every push to master and publishes a
# GitHub release tagged from the VERSION file. VERSION is bumped automatically
# (see "Bump version" below) -- nobody needs to hand-edit VERSION/__version__
# in a PR anymore. Re-runs at an already-released version (e.g. a manual
# workflow_dispatch, or a push whose HEAD commit is itself a bump commit) are
# a no-op (the tag already exists). Can also be run manually from the Actions
# tab, which builds/publishes at the current VERSION without bumping.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write   # needed to push the version-bump commit and create the tag + release via GITHUB_TOKEN

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      # master's ruleset (.github/rulesets/protect-master.json) requires a PR
      # for everyone except the repo-admin bypass actor. The default
      # GITHUB_TOKEN pushes as github-actions[bot], which isn't covered by
      # that bypass, so the version-bump push below would be rejected.
      # Checking out with an admin-owned PAT (RELEASE_PUSH_TOKEN secret)
      # makes that push attributable to the admin account instead, which the
      # ruleset already allows to bypass -- see BRANCH_PROTECTION.md.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ secrets.RELEASE_PUSH_TOKEN }}

      - name: Bump version (minor by default; [major]/[patch]/[no-bump] in the HEAD commit message override)
        # Only on an actual push to master -- workflow_dispatch reruns the
        # current VERSION as-is (e.g. to rebuild/republish without cutting a
        # new version). Runs before the Python setup since it's plain git/bash.
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          # Plain bash substring matching, deliberately not grep -i: grep -qiF
          # on this exact runner/shell (Git Bash on windows-latest) aborts
          # (SIGABRT) on a -i+-F pattern containing brackets like "[major]" --
          # reproduced locally, not a hypothetical. Bash string matching has
          # no such issue.
          MSG="$(git log -1 --pretty=%B)"
          MSG_LOWER="${MSG,,}"

          if [[ "$MSG_LOWER" == *"[no-bump]"* ]]; then
            echo "HEAD commit marked [no-bump] -- leaving VERSION as-is."
          else
            if [[ "$MSG_LOWER" == *"[major]"* ]]; then
              BUMP=major
            elif [[ "$MSG_LOWER" == *"[patch]"* ]]; then
              BUMP=patch
            else
              BUMP=minor
            fi

            CURRENT="$(tr -d '[:space:]' < VERSION)"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac

            NEW="$MAJOR.$MINOR.$PATCH"
            echo "Bumping version ($BUMP): $CURRENT -> $NEW"

            printf '%s' "$NEW" > VERSION
            sed -i "s/^__version__ = \"$CURRENT\"\$/__version__ = \"$NEW\"/" claudebar.py
            grep -qF "__version__ = \"$NEW\"" claudebar.py

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add VERSION claudebar.py
            git commit -m "chore: bump version to v$NEW [no-bump]"
            # Uses the default GITHUB_TOKEN, so this push does not itself
            # trigger another workflow run (GitHub suppresses that to avoid
            # recursion) -- this job's own later steps just see the bumped
            # files already checked out, no re-checkout needed.
            git push origin HEAD:master
          fi

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        # pyinstaller pinned for the same reason requirements.txt is: released
        # exes must not silently absorb a new upstream build toolchain.
        run: python -m pip install -r requirements.txt pyinstaller==6.21.0

      - name: Run test suite (gate)
        run: python claudebar.py --test

      - name: Build exes (slim hook exe first — the main spec embeds it)
        run: |
          python generate_icon.py
          pyinstaller ClaudebarHook.spec
          pyinstaller Claudebar.spec

      - name: Smoke-test the statusline hook from both exes (gate)
        shell: cmd
        # A --noconsole (GUI-subsystem) exe only exposes stdin/stdout when the
        # parent redirects them via handles -- which cmd file-redirection and
        # Claude Code's own spawn both do, but a PowerShell pipe does NOT. So
        # this gate MUST use cmd redirection, or it would spuriously "fail".
        run: |
          echo {"model":{"display_name":"test"},"rate_limits":{"five_hour":{"used_percentage":50,"resets_at":4102444800}}}> payload.json
          dist\Claudebar.exe --statusline-hook < payload.json > hookout.txt
          type hookout.txt
          findstr /C:"test | 5h 50%" hookout.txt || (echo MAIN EXE HOOK SMOKE TEST FAILED & exit /b 1)
          dist\ClaudebarHook.exe --statusline-hook < payload.json > hookout2.txt
          type hookout2.txt
          findstr /C:"test | 5h 50%" hookout2.txt || (echo SLIM HOOK EXE SMOKE TEST FAILED & exit /b 1)

      - name: Read version
        id: ver
        shell: bash
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Create release if the tag is new
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          tag="v${VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — nothing to publish."
            exit 0
          fi
          # Checksums so downloads are verifiable (the exe is not code-signed).
          (cd dist && sha256sum Claudebar.exe) > SHA256SUMS.txt
          cat SHA256SUMS.txt
          gh release create "$tag" dist/Claudebar.exe SHA256SUMS.txt \
            --title "$tag" \
            --notes "Standalone Windows executable for Claudebar (Claude Code usage tray). No Python required — download \`Claudebar.exe\`, run it, and it wires up the statusLine hook automatically (restart Claude Code once). Verify the download against \`SHA256SUMS.txt\`."
